services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ravioli_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ravioli_password}
      POSTGRES_DB: ${POSTGRES_DB:-ravioli_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/ravioli/backend/data/oltp/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ${LOCAL_DATA_PATH:-./.duckdb}:/local_data:rw
    ports:
      - "5432:5432"
    networks:
      - ravioli_net
    restart: always

  backend:
    build: .
    container_name: backend
    environment:
      - DB_HOST=postgres
      - LOCAL_DATA_PATH=/local_data
    volumes:
      - .:/app
      - ${LOCAL_DATA_PATH:-./.duckdb}:/local_data:rw
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file:
      - .env
    networks:
      - ravioli_net
    restart: always

  frontend:
    build:
      context: ./src/ravioli/frontend
    container_name: ravioli-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - ravioli_net
    restart: always

volumes:
  postgres_data:

networks:
  ravioli_net:
    driver: bridge
