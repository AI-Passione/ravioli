services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ravioli_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ravioli_password}
      POSTGRES_DB: ${POSTGRES_DB:-ravioli_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/ravioli/backend/data/oltp/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ${LOCAL_DATA_PATH:-./.duckdb}:/local_data:rw
    ports:
      - "5432:5432"
    networks:
      - ravioli_net
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-ravioli_user} -d $${POSTGRES_DB:-ravioli_db}"]
      interval: 5s
      timeout: 5s
      retries: 5


  backend:
    build: .
    container_name: backend
    environment:
      - DB_HOST=postgres
      - LOCAL_DATA_PATH=/local_data
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
      - ${LOCAL_DATA_PATH:-./.duckdb}:/local_data:rw
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 5s
      timeout: 5s
      retries: 5

    env_file:
      - .env
    networks:
      - ravioli_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  frontend:
    build:
      context: ./src/ravioli/frontend
    container_name: frontend
    volumes:
      - ./src/ravioli/frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

    networks:
      - ravioli_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

volumes:
  postgres_data:

networks:
  ravioli_net:
    driver: bridge
